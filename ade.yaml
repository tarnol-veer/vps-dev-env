# ADE manifest
# Declarative source of truth for the reference Agent Development Environment.

ade:
  name: ADE
  full_name: Agent Development Environment
  version: 0.2.1
  profile: ubuntu-vps
  description: Opinionated reproducible environment for AI-agent-based development.

platform:
  os: ubuntu
  release: "24.04"
  minimum:
    cpu: 1
    memory_gb: 3
    disk_gb: 20

users:
  mode: current
  agent_user_env: AGENT_USER
  default_resolution:
    - explicit AGENT_USER
    - sudo caller
    - current user

paths:
  dev_root: "~/dev"
  repos_dir: "~/dev/repos"
  tools_dir: "~/dev/tools"
  cache_dir: "~/dev/cache"
  logs_dir: "~/dev/logs"
  config_dirs:
    - "~/.config/ade"
    - "~/.config/vos"

packages:
  apt: packages/apt.txt
  python: packages/python.txt
  npm: packages/npm.txt

runtime:
  python:
    manager: uv
    preferred_version: "3.13"
    fallback_version: "3.12"
  node:
    channel: lts
    package_manager: pnpm

source_control:
  provider: github
  cli: gh
  git:
    config_template: configs/gitconfig.example

agent_stack:
  planner:
    name: hermes
    required: true
    component: hermes
    role: planning, orchestration, tool selection, result checking
  coder:
    name: opencode
    required: true
    component: opencode
    role: code-oriented implementation work

components:
  base:
    installer: scripts/install-base.sh
    provides:
      - apt packages
      - selected user
      - directory layout

  python:
    installer: scripts/install-python.sh
    depends_on:
      - base
    provides:
      - uv
      - python

  node:
    installer: scripts/install-node.sh
    depends_on:
      - base
    provides:
      - node
      - npm
      - pnpm

  github:
    installer: scripts/install-github.sh
    depends_on:
      - base
    provides:
      - gh

  git_config:
    installer: scripts/setup-git.sh
    depends_on:
      - base
      - github
    provides:
      - git global config

  ssh:
    installer: scripts/setup-ssh.sh
    depends_on:
      - base
    provides:
      - ssh directory
      - github ssh host config

  hermes:
    installer: scripts/install-hermes.sh
    depends_on:
      - base
      - python
      - github
    required: true
    provides:
      - planner
      - orchestrator

  opencode:
    installer: scripts/install-opencode.sh
    depends_on:
      - base
      - node
      - github
    required: true
    provides:
      - coding agent

  repos:
    installer: scripts/clone-repos.sh
    depends_on:
      - git_config
      - ssh
    provides:
      - project-memory placeholder
      - project-core placeholder
      - playground placeholder

  healthcheck:
    installer: scripts/healthcheck.sh
    depends_on:
      - base
      - python
      - node
      - github
      - hermes
      - opencode
      - repos
    provides:
      - environment validation

install_plan:
  - scripts/install-base.sh
  - scripts/install-python.sh
  - scripts/install-node.sh
  - scripts/install-github.sh
  - scripts/setup-git.sh
  - scripts/setup-ssh.sh
  - scripts/install-hermes.sh
  - scripts/install-opencode.sh
  - scripts/clone-repos.sh
  - scripts/healthcheck.sh

repositories:
  memory:
    env: MEMORY_REPO
    target: project-memory
    required: false
  core:
    env: CORE_REPO
    target: project-core
    required: false
  playground:
    env: PLAYGROUND_REPO
    target: playground
    required: false

services:
  healthcheck:
    service: systemd/healthcheck.service
    timer: systemd/healthcheck.timer
    enabled_by_default: false

principles:
  - no secrets in repository
  - idempotent installers
  - repository as source of truth
  - cloud models by default
  - no local LLMs by default
  - Hermes and OpenCode are required in the reference stack
